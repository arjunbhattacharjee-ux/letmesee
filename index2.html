<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AR Locator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:sans-serif; color:#fff; }
video  { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
canvas { position:fixed; inset:0; width:100%; height:100%; z-index:1; pointer-events:none; }

#p1 {
  position:fixed; inset:0; z-index:10; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:24px; padding:40px 28px; text-align:center;
}
#p1.hidden { display:none; }
#p1 h2 { font-size:24px; }
#p1 p  { font-size:14px; color:#999; line-height:1.9; max-width:290px; }
#startBtn {
  width:100%; max-width:300px; padding:20px;
  font-size:18px; font-weight:bold;
  background:#fff; color:#000;
  border:none; border-radius:12px; cursor:pointer;
  transition: opacity .2s;
}
#startBtn:disabled { opacity:.4; }

#loading {
  position:fixed; inset:0; z-index:9; background:rgba(0,0,0,0.75);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; font-size:14px; color:#aaa;
}
#loading.on { display:flex; }
.spinner {
  width:40px; height:40px; border:3px solid #333;
  border-top-color:#fff; border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

#filters {
  position:fixed; bottom:52px; left:0; right:0; z-index:5;
  display:none; padding:0 10px 6px;
  overflow-x:auto; white-space:nowrap;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
#filters::-webkit-scrollbar { display:none; }
#filters.on { display:block; }

.chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:7px 13px; margin-right:7px;
  font-size:12px; font-weight:600; cursor:pointer;
  border-radius:20px; border:1.5px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.55); color:rgba(255,255,255,0.55);
  transition:all .15s; user-select:none; -webkit-user-select:none;
  backdrop-filter:blur(6px);
}
.chip.active { background:rgba(255,255,255,0.92); color:#000; border-color:transparent; }

#rescan {
  position:fixed; top:52px; right:12px; z-index:5;
  background:rgba(0,0,0,0.55); color:#fff;
  border:1px solid rgba(255,255,255,0.3); border-radius:8px;
  padding:8px 14px; font-size:12px; cursor:pointer; display:none;
  backdrop-filter:blur(6px);
}

#rangebadge {
  position:fixed; top:52px; left:12px; z-index:5;
  background:rgba(0,0,0,0.55); color:#aaa;
  border:1px solid rgba(255,255,255,0.15); border-radius:8px;
  padding:6px 12px; font-size:11px; display:none;
  backdrop-filter:blur(6px);
}

/* Demo mode banner */
#demobanner {
  position:fixed; top:52px; left:50%; transform:translateX(-50%);
  z-index:6; background:rgba(255,170,0,0.15);
  border:1px solid rgba(255,170,0,0.4); border-radius:8px;
  padding:6px 14px; font-size:11px; color:#ffaa00;
  display:none; white-space:nowrap; backdrop-filter:blur(6px);
}
#demobanner.on { display:block; }

#debug {
  position:fixed; bottom:8px; left:8px; right:8px; z-index:4;
  font-size:10px; color:rgba(255,255,255,0.65);
  background:rgba(0,0,0,0.5); padding:6px 10px;
  border-radius:8px; line-height:1.9; font-family:monospace;
  backdrop-filter:blur(4px);
}

#bg {
  position:fixed; inset:0; z-index:0;
  background: linear-gradient(175deg, #050510 0%, #0a1525 50%, #101a08 100%);
  display:none;
}
#bg.on { display:block; }
</style>
</head>
<body>

<div id="bg"></div>

<div id="p1">
  <h2>📍 AR Locator</h2>
  <p>Live nearby places from OpenStreetMap.<br>Point your camera and see what's around you.</p>
  <button id="startBtn" onclick="startAR()">Enable &amp; Start</button>
  <p id="msg" style="font-size:12px;color:#f80;min-height:18px;line-height:1.5"></p>
</div>

<div id="loading"><div class="spinner"></div><span id="loadmsg">Loading…</span></div>

<video id="vid" autoplay playsinline muted></video>
<canvas id="cv"></canvas>

<button id="rescan" onclick="fetchPlaces()">⟳ Rescan</button>
<div id="rangebadge"></div>
<div id="demobanner">⚠ Demo mode — simulated GPS &amp; compass</div>
<div id="filters"></div>
<div id="debug">Tap Start to begin</div>

<script>
const CATEGORIES = [
  { id:'all',       label:'All',       icon:'🌐', tags:null },
  { id:'food',      label:'Food',      icon:'🍽️', tags:{ amenity:['restaurant','fast_food','food_court'] } },
  { id:'cafe',      label:'Cafés',     icon:'☕',  tags:{ amenity:['cafe'] } },
  { id:'mall',      label:'Shops',     icon:'🏬', tags:{ shop:['mall','department_store','supermarket','convenience'] } },
  { id:'hotel',     label:'Hotels',    icon:'🏨', tags:{ tourism:['hotel','motel','hostel','guest_house'] } },
  { id:'worship',   label:'Worship',   icon:'🕌', tags:{ amenity:['mosque','church','temple','place_of_worship'] } },
  { id:'health',    label:'Health',    icon:'💊', tags:{ amenity:['pharmacy','hospital','clinic','doctors'] } },
  { id:'bank',      label:'Bank/ATM',  icon:'🏦', tags:{ amenity:['bank','atm'] } },
  { id:'transport', label:'Transport', icon:'🚌', tags:{ amenity:['bus_station','taxi','parking','fuel'] } },
  { id:'leisure',   label:'Leisure',   icon:'🎭', tags:{ amenity:['cinema','theatre','nightclub'], tourism:['attraction','museum'] } },
];

const ICON_MAP = {
  restaurant:'🍽️', fast_food:'🍔', food_court:'🍱',
  cafe:'☕', bar:'🍺',
  mall:'🏬', department_store:'🏬', supermarket:'🛒', convenience:'🏪',
  hotel:'🏨', motel:'🏨', hostel:'🛏️', guest_house:'🏠',
  mosque:'🕌', church:'⛪', temple:'🛕', place_of_worship:'🛕',
  pharmacy:'💊', hospital:'🏥', clinic:'🩺', doctors:'👨‍⚕️',
  bank:'🏦', atm:'💳',
  bus_station:'🚌', taxi:'🚕', parking:'🅿️', fuel:'⛽',
  cinema:'🎬', theatre:'🎭', nightclub:'🎶', attraction:'⭐', museum:'🏛️',
};

const CAT_COLORS = {
  food:'#ff6644', cafe:'#ffaa44', mall:'#44aaff',
  hotel:'#aa88ff', worship:'#ff88cc', health:'#44ff88',
  bank:'#ffee44', transport:'#00ffcc', leisure:'#ff44ff', other:'#aaaaaa'
};

function iconFor(tags) {
  for (const k of ['amenity','shop','tourism','leisure'])
    if (tags[k] && ICON_MAP[tags[k]]) return ICON_MAP[tags[k]];
  return '📍';
}
function nameFor(tags) { return tags.name || tags['name:en'] || null; }
function catFor(tags) {
  for (const cat of CATEGORIES) {
    if (!cat.tags) continue;
    for (const [key,vals] of Object.entries(cat.tags))
      if (vals.includes(tags[key])) return cat.id;
  }
  return 'other';
}

const canvas = document.getElementById('cv');
const ctx    = canvas.getContext('2d');
let userLat=null, userLng=null, compass=null, eventCount=0;
let allPlaces=[], activeFilter='all';
let demoMode = false;
let demoTimer = null;

const FOV      = 100;
const FETCH_R  = 1000;
const MAX_PINS = 100;
const OVERLAP  = 68;

// ── Demo mode: simulated GPS + slowly rotating compass ───────────────────
// Uses Dubai Downtown as demo location
const DEMO_LAT = 25.1972, DEMO_LNG = 55.2796;

function startDemoMode() {
  demoMode = true;
  document.getElementById('demobanner').classList.add('on');
  userLat = DEMO_LAT;
  userLng = DEMO_LNG;
  compass = 0;
  // Slowly rotate compass so pins move across screen
  demoTimer = setInterval(() => { compass = (compass + 0.4) % 360; }, 50);
  fetchPlaces();
}

function stopDemoMode() {
  demoMode = false;
  document.getElementById('demobanner').classList.remove('on');
  if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
}

function setMsg(txt) {
  document.getElementById('msg').textContent = txt;
}

function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function visiblePlaces() {
  return activeFilter==='all' ? allPlaces : allPlaces.filter(p=>p.catId===activeFilter);
}

function buildFilters() {
  const bar = document.getElementById('filters');
  bar.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (cat.id===activeFilter ? ' active' : '');
    chip.innerHTML = `${cat.icon} ${cat.label}`;
    chip.onclick = () => {
      activeFilter = cat.id;
      document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
    };
    bar.appendChild(chip);
  });
  bar.classList.add('on');
}

async function fetchPlaces() {
  if (!userLat||!userLng) return;
  document.getElementById('loading').classList.add('on');
  document.getElementById('loadmsg').textContent = 'Fetching nearby places…';

  const ll = `${userLat},${userLng}`;
  const query = `
    [out:json][timeout:25];
    (
      node["amenity"](around:${FETCH_R},${ll});
      node["shop"](around:${FETCH_R},${ll});
      node["tourism"](around:${FETCH_R},${ll});
      node["leisure"](around:${FETCH_R},${ll});
    );
    out body ${MAX_PINS};
  `;
  try {
    const res  = await fetch('https://overpass-api.de/api/interpreter',
      { method:'POST', body:'data='+encodeURIComponent(query) });
    const json = await res.json();
    allPlaces = (json.elements||[])
      .filter(e=>e.lat&&e.lon&&nameFor(e.tags))
      .map(e => {
        const catId=catFor(e.tags);
        return { name:nameFor(e.tags), icon:iconFor(e.tags), catId,
                 color:CAT_COLORS[catId]||'#aaa', lat:e.lat, lng:e.lon };
      })
      .sort((a,b)=>gDist(userLat,userLng,a.lat,a.lng)-gDist(userLat,userLng,b.lat,b.lng))
      .slice(0,MAX_PINS);

    document.getElementById('loadmsg').textContent = `Found ${allPlaces.length} places`;
    const badge = document.getElementById('rangebadge');
    badge.textContent = `📍 ${allPlaces.length} places · ${FETCH_R}m`;
    badge.style.display = 'block';
    setTimeout(()=>document.getElementById('loading').classList.remove('on'), 600);
    document.getElementById('rescan').style.display = 'block';
  } catch(e) {
    document.getElementById('loadmsg').textContent = 'Network error — retrying…';
    setTimeout(()=>{ document.getElementById('loading').classList.remove('on'); }, 2000);
  }
}

function onOrientation(e) {
  if (demoMode) return; // ignore real events during demo
  eventCount++;
  if (typeof e.webkitCompassHeading==='number' && e.webkitCompassHeading>=0)
    compass = e.webkitCompassHeading;
  else if (e.absolute && e.alpha!=null)
    compass = (360-e.alpha)%360;
  else if (e.alpha!=null)
    compass = (360-e.alpha)%360;
}

// ── Main start function ───────────────────────────────────────────────────
async function startAR() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  setMsg('Starting…');

  // ── 1. Camera ─────────────────────────────────────────────────────────
  let cameraOk = false;
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ ideal:'environment' }, width:{ ideal:1920 } }, audio:false
      });
      document.getElementById('vid').srcObject = stream;
      cameraOk = true;
    } catch(e) {
      document.getElementById('bg').classList.add('on');
      setMsg('⚠ No camera — continuing without it');
    }
  } else {
    document.getElementById('bg').classList.add('on');
  }

  // ── 2. Motion / compass ───────────────────────────────────────────────
  let compassOk = false;
  if (typeof DeviceOrientationEvent !== 'undefined') {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS 13+ — must request
      try {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r === 'granted') {
          window.addEventListener('deviceorientation', onOrientation, true);
          compassOk = true;
        } else {
          setMsg('⚠ Motion permission denied');
        }
      } catch(e) {
        setMsg('⚠ Could not request motion: ' + e.message);
      }
    } else {
      // Android / desktop — just listen
      window.addEventListener('deviceorientationabsolute', onOrientation, true);
      window.addEventListener('deviceorientation', onOrientation, true);
      compassOk = true;
    }
  }

  // ── 3. GPS ────────────────────────────────────────────────────────────
  let gpsOk = false;
  if (navigator.geolocation) {
    // Race GPS against a 6-second timeout
    await new Promise(resolve => {
      document.getElementById('loading').classList.add('on');
      document.getElementById('loadmsg').textContent = 'Getting GPS…';

      const timer = setTimeout(() => {
        resolve(); // timed out — fall through to demo
      }, 6000);

      navigator.geolocation.watchPosition(
        pos => {
          clearTimeout(timer);
          const first = !userLat;
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          gpsOk = true;
          if (first) { fetchPlaces(); resolve(); }
        },
        err => {
          clearTimeout(timer);
          setMsg('⚠ GPS unavailable: ' + err.message);
          resolve();
        },
        { enableHighAccuracy:true, timeout:8000 }
      );
    });
  }

  // ── 4. Check what we got; fall back to demo if needed ─────────────────
  document.getElementById('loading').classList.remove('on');

  const needsDemo = !gpsOk || !compassOk;
  if (needsDemo) {
    if (!gpsOk && !compassOk)
      setMsg('No GPS or compass — running demo mode (Dubai)');
    else if (!gpsOk)
      setMsg('No GPS — running demo mode (Dubai)');
    else
      setMsg('No compass — running demo mode');
    startDemoMode();
  }

  // ── 5. Always show the AR view ─────────────────────────────────────────
  document.getElementById('p1').classList.add('hidden');
  buildFilters();
  draw();
}

// ── Overlap detection ─────────────────────────────────────────────────────
function computeIconOnly(pins) {
  const slim = new Set();
  for (let i=0; i<pins.length; i++) {
    if (slim.has(i)) continue;
    for (let j=i+1; j<pins.length; j++) {
      if (slim.has(j)) continue;
      const dx=pins[i].x-pins[j].x, dy=pins[i].y-pins[j].y;
      if (Math.sqrt(dx*dx+dy*dy) < OVERLAP) slim.add(j);
    }
  }
  return slim;
}

// ── Main draw loop ────────────────────────────────────────────────────────
function draw() {
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  if (compass!==null && userLat) {
    const places = visiblePlaces();

    // Pass 1 — screen positions
    const pins = [];
    for (let i=0; i<places.length; i++) {
      const p=places[i];
      const brg=bearing(userLat,userLng,p.lat,p.lng);
      const d=gDist(userLat,userLng,p.lat,p.lng);
      let diff=brg-compass;
      if (diff> 180) diff-=360;
      if (diff<-180) diff+=360;
      if (Math.abs(diff)>FOV/2) continue;

      const x = W*(0.5+diff/FOV);
      const t = Math.min(1, Math.max(0, (d-20)/(FETCH_R-20)));
      const y = H*(0.82 - 0.64*t);
      pins.push({p, x, y, d, color:p.color});
    }

    const slim = computeIconOnly(pins);

    // Pass 2 — draw far-to-near so near pins render on top
    const sorted = [...pins].sort((a,b)=>b.d-a.d);
    for (let si=0; si<sorted.length; si++) {
      const orig = pins.indexOf(sorted[si]);
      const {p,x,y,d,color} = sorted[si];
      const isSlim = slim.has(orig);

      if (isSlim) {
        // Compact icon-only
        ctx.globalAlpha=0.2;
        ctx.beginPath(); ctx.arc(x,y,20,0,Math.PI*2);
        ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.stroke();

        ctx.globalAlpha=0.88;
        ctx.beginPath(); ctx.arc(x,y,12,0,Math.PI*2);
        ctx.fillStyle=color; ctx.fill();

        ctx.globalAlpha=1;
        ctx.font='10px sans-serif'; ctx.textAlign='center';
        ctx.fillText(p.icon, x, y+4);

        ctx.globalAlpha=0.75;
        ctx.fillStyle='rgba(0,0,0,0.7)';
        ctx.beginPath(); ctx.roundRect(x-17,y+14,34,14,4); ctx.fill();
        ctx.globalAlpha=1;
        ctx.font='8px sans-serif'; ctx.fillStyle=color; ctx.textAlign='center';
        ctx.fillText(fmtDist(d), x, y+23);

      } else {
        // Full labelled pin
        ctx.globalAlpha=0.1;
        ctx.beginPath(); ctx.arc(x,y,42,0,Math.PI*2);
        ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();

        ctx.globalAlpha=0.28;
        ctx.beginPath(); ctx.arc(x,y,25,0,Math.PI*2);
        ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.stroke();

        ctx.globalAlpha=1;
        ctx.beginPath(); ctx.arc(x,y,15,0,Math.PI*2);
        ctx.fillStyle=color; ctx.fill();

        ctx.font='13px sans-serif'; ctx.textAlign='center'; ctx.fillStyle='rgba(0,0,0,0.85)';
        ctx.fillText(p.icon, x, y+5);

        const label = p.name.length>20 ? p.name.slice(0,18)+'…' : p.name;
        const pillW = Math.max(108, label.length*7+26);
        const pillH = 38, pillX=x-pillW/2, pillY=y+20;

        ctx.globalAlpha=0.9;
        ctx.fillStyle='rgba(0,0,0,0.82)';
        ctx.beginPath(); ctx.roundRect(pillX,pillY,pillW,pillH,8); ctx.fill();

        ctx.fillStyle=color; ctx.globalAlpha=0.8;
        ctx.beginPath(); ctx.roundRect(pillX,pillY,3,pillH,[8,0,0,8]); ctx.fill();

        ctx.globalAlpha=1; ctx.textAlign='center';
        ctx.font='bold 11px sans-serif'; ctx.fillStyle='#fff';
        ctx.fillText(label, x+1, pillY+14);
        ctx.font='10px sans-serif'; ctx.fillStyle=color;
        ctx.fillText(fmtDist(d), x+1, pillY+28);
      }
    }
  } else if (userLat && compass===null) {
    // Compass waiting message
    ctx.globalAlpha=0.5; ctx.textAlign='center';
    ctx.font='14px sans-serif'; ctx.fillStyle='#fff';
    ctx.fillText('Waiting for compass…', W/2, H/2);
    ctx.font='12px sans-serif'; ctx.fillStyle='#888';
    ctx.fillText('Try tilting your phone', W/2, H/2+24);
    ctx.globalAlpha=1;
  }

  // ── Compass strip ──
  if (compass!==null) {
    ctx.globalAlpha=0.4;
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,W,46);
    ctx.globalAlpha=1;

    const dirs=[
      {l:'N',b:0},{l:'NE',b:45},{l:'E',b:90},{l:'SE',b:135},
      {l:'S',b:180},{l:'SW',b:225},{l:'W',b:270},{l:'NW',b:315}
    ];
    for (const d of dirs) {
      let diff=d.b-compass;
      if (diff> 180) diff-=360;
      if (diff<-180) diff+=360;
      if (Math.abs(diff)>FOV/2) continue;
      const x=W*(0.5+diff/FOV);
      const main=d.l.length===1;
      ctx.globalAlpha=main?1:0.45;
      ctx.font=`${main?'bold ':''} ${main?14:11}px sans-serif`;
      ctx.textAlign='center';
      ctx.fillStyle=d.l==='N'?'#ff5544':'#fff';
      ctx.fillText(d.l, x, 28);
      ctx.globalAlpha=main?0.55:0.2;
      ctx.strokeStyle='#fff'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x,34); ctx.lineTo(x,40); ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.font='bold 10px monospace'; ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.fillText(Math.round(compass)+'°', W/2, 28);
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(W/2,40); ctx.lineTo(W/2,46); ctx.stroke();
  }

  // ── Crosshair ──
  ctx.globalAlpha=0.2; ctx.strokeStyle='#fff'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2,H/2-15); ctx.lineTo(W/2,H/2+15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2-15,H/2); ctx.lineTo(W/2+15,H/2); ctx.stroke();
  ctx.globalAlpha=1;

  // ── Debug ──
  const gps = userLat?`${userLat.toFixed(4)},${userLng.toFixed(4)}`:'waiting…';
  document.getElementById('debug').textContent =
    `${demoMode?'[DEMO] ':''}hdg:${compass!==null?Math.round(compass)+'°':'—'}  ·  events:${eventCount}  ·  pins:${visiblePlaces().length}/${allPlaces.length}  ·  gps:${gps}`;

  requestAnimationFrame(draw);
}

function bearing(la1,lo1,la2,lo2) {
  const R=Math.PI/180, dL=(lo2-lo1)*R;
  const y=Math.sin(dL)*Math.cos(la2*R);
  const x=Math.cos(la1*R)*Math.sin(la2*R)-Math.sin(la1*R)*Math.cos(la2*R)*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function gDist(la1,lo1,la2,lo2) {
  const R=6371000, r=Math.PI/180;
  const dφ=(la2-la1)*r, dλ=(lo2-lo1)*r;
  const a=Math.sin(dφ/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m) { return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km'; }
</script>
</body>
</html>
