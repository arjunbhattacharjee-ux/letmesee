<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AR Locator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:sans-serif; color:#fff; }
video  { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
canvas { position:fixed; inset:0; width:100%; height:100%; z-index:1; pointer-events:none; }

#p1 {
  position:fixed; inset:0; z-index:10; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:24px; padding:40px 28px; text-align:center;
}
#p1.hidden { display:none; }
#p1 h2 { font-size:24px; }
#p1 p  { font-size:14px; color:#999; line-height:1.9; max-width:290px; }

#startBtn {
  width:100%; max-width:300px; padding:20px;
  font-size:18px; font-weight:bold;
  background:#fff; color:#000;
  border:none; border-radius:12px; cursor:pointer;
}

#debug {
  position:fixed; bottom:8px; left:8px; right:8px; z-index:5;
  font-size:12px; color:rgba(255,255,255,0.9);
  background:rgba(0,0,0,0.7); padding:10px 12px;
  border-radius:8px; line-height:2; font-family:monospace;
}
</style>
</head>
<body>

<div id="p1">
  <h2>AR Locator</h2>
  <p>Tap to enable compass and camera. Dots will appear showing nearby locations as you turn.</p>
  <button id="startBtn" onclick="startAR()">Enable &amp; Start</button>
  <p id="msg" style="font-size:12px;color:#666;min-height:18px"></p>
</div>

<video id="vid" autoplay playsinline muted></video>
<canvas id="cv"></canvas>
<div id="debug">Tap Start to begin</div>

<script>
const PLACES = [
  { name:'Burj Khalifa',    lat:25.197197, lng:55.274376, color:'#ff4444' },
  { name:'Dubai Mall',      lat:25.198765, lng:55.279503, color:'#44aaff' },
  { name:'Dubai Opera',     lat:25.194987, lng:55.272345, color:'#44ff88' },
  { name:'Armani Hotel',    lat:25.196500, lng:55.273800, color:'#ffaa00' },
  { name:'Emirates Towers', lat:25.217345, lng:55.282123, color:'#ff44ff' },
];

const canvas = document.getElementById('cv');
const ctx    = canvas.getContext('2d');
let userLat  = 25.2120, userLng = 55.2817;
let compass  = null;
let eventCount = 0;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Called on every single orientation event — keeps compass live
function onOrientation(e) {
  eventCount++;
  if (typeof e.webkitCompassHeading === 'number' && e.webkitCompassHeading >= 0) {
    compass = e.webkitCompassHeading;
  }
}

async function startAR() {
  document.getElementById('msg').textContent = 'Starting…';

  // Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal:'environment' } }, audio: false
    });
    document.getElementById('vid').srcObject = stream;
  } catch(e) {
    document.getElementById('msg').textContent = 'No camera — using black background';
  }

  // iOS motion permission — MUST be called directly from tap
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result === 'granted') {
        // Attach listener — fires ~60x per second as device moves
        window.addEventListener('deviceorientation', onOrientation, true);
        document.getElementById('msg').textContent = 'Compass active ✓';
      } else {
        document.getElementById('msg').textContent = '⚠ Motion denied. Go to Settings > Safari > Motion & Orientation Access';
        return;
      }
    } catch(e) {
      document.getElementById('msg').textContent = 'Error: ' + e.message;
      return;
    }
  } else {
    // Android / non-iOS
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation',         onOrientation, true);
  }

  // GPS
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      p => { userLat = p.coords.latitude; userLng = p.coords.longitude; },
      null, { enableHighAccuracy: true }
    );
  }

  document.getElementById('p1').classList.add('hidden');
  draw();
}

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const FOV = 60; // degrees visible left-right

  if (compass !== null) {
    for (const p of PLACES) {
      const brg = bearing(userLat, userLng, p.lat, p.lng);
      const d   = dist(userLat, userLng, p.lat, p.lng);

      // How many degrees is this place from where we're pointing?
      let diff = brg - compass;
      if (diff >  180) diff -= 360;
      if (diff < -180) diff += 360;

      // Only show if within FOV
      if (Math.abs(diff) > FOV / 2) continue;

      // Map to screen X: diff=0 → centre, diff=±FOV/2 → edges
      const x = W * (0.5 + diff / FOV);
      const y = H * 0.40;

      // Outer glow
      ctx.globalAlpha = 0.2;
      ctx.beginPath(); ctx.arc(x, y, 44, 0, Math.PI*2);
      ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.stroke();

      // Middle ring
      ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc(x, y, 28, 0, Math.PI*2);
      ctx.strokeStyle = p.color; ctx.lineWidth = 1.5; ctx.stroke();

      // Solid dot
      ctx.globalAlpha = 1;
      ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();

      // Label pill
      ctx.globalAlpha = 0.88;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.beginPath(); ctx.roundRect(x - 64, y + 20, 128, 40, 7); ctx.fill();

      ctx.globalAlpha = 1; ctx.textAlign = 'center';
      ctx.font = 'bold 13px sans-serif'; ctx.fillStyle = '#fff';
      ctx.fillText(p.name, x, y + 36);
      ctx.font = '11px sans-serif'; ctx.fillStyle = p.color;
      ctx.fillText(fmtDist(d), x, y + 52);
    }
  }

  // Crosshair
  ctx.globalAlpha = 0.35; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2, H/2-20); ctx.lineTo(W/2, H/2+20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2-20, H/2); ctx.lineTo(W/2+20, H/2); ctx.stroke();
  ctx.globalAlpha = 1;

  // Heading arc at top — shows which direction you're facing
  if (compass !== null) {
    const dirs = [{l:'N',b:0},{l:'NE',b:45},{l:'E',b:90},{l:'SE',b:135},
                  {l:'S',b:180},{l:'SW',b:225},{l:'W',b:270},{l:'NW',b:315}];
    ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    for (const d of dirs) {
      let diff = d.b - compass;
      if (diff >  180) diff -= 360;
      if (diff < -180) diff += 360;
      if (Math.abs(diff) > FOV / 2) continue;
      const x = W * (0.5 + diff / FOV);
      ctx.globalAlpha = d.l.length === 1 ? 0.9 : 0.4;
      ctx.fillStyle = d.l === 'N' ? '#ff4444' : '#fff';
      ctx.fillText(d.l, x, 36);
    }
    ctx.globalAlpha = 1;
  }

  document.getElementById('debug').textContent =
    `compass: ${compass !== null ? Math.round(compass) + '°' : '—'} | ` +
    `events: ${eventCount} | ` +
    `gps: ${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;

  requestAnimationFrame(draw);
}

function bearing(la1, lo1, la2, lo2) {
  const R = Math.PI/180, dL = (lo2-lo1)*R;
  const y = Math.sin(dL)*Math.cos(la2*R);
  const x = Math.cos(la1*R)*Math.sin(la2*R) - Math.sin(la1*R)*Math.cos(la2*R)*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function dist(la1, lo1, la2, lo2) {
  const R=6371000, r=Math.PI/180;
  const dφ=(la2-la1)*r, dλ=(lo2-lo1)*r;
  const a=Math.sin(dφ/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m) { return m<1000 ? Math.round(m)+'m' : (m/1000).toFixed(1)+'km'; }
</script>
</body>
</html>
