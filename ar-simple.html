<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AR Simple</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: sans-serif; }

#startBtn {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #000; color: #fff; gap: 16px; z-index: 10;
}
#startBtn button {
  padding: 14px 32px; font-size: 16px; background: #fff; color: #000;
  border: none; border-radius: 8px; cursor: pointer;
}
#startBtn p { font-size: 12px; color: #888; max-width: 280px; text-align: center; }

video {
  position: fixed; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
}

canvas {
  position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1;
}

#debug {
  position: fixed; bottom: 10px; left: 10px; right: 10px;
  font-size: 11px; color: rgba(255,255,255,0.7);
  background: rgba(0,0,0,0.5); padding: 8px; border-radius: 6px;
  z-index: 2; line-height: 1.8;
}
</style>
</head>
<body>

<div id="startBtn">
  <h2 style="font-size:20px">AR Locator</h2>
  <p>Points camera at your surroundings — highlights 5 nearby locations</p>
  <button onclick="start()">Start Camera</button>
</div>

<video id="vid" autoplay playsinline muted></video>
<canvas id="cv"></canvas>
<div id="debug">Starting...</div>

<script>
// ── 5 hardcoded places (change to real coords near you) ──
const PLACES = [
  { name: 'Burj Khalifa',    lat: 25.197197, lng: 55.274376, color: '#ff4444' },
  { name: 'Dubai Mall',      lat: 25.198765, lng: 55.279503, color: '#44aaff' },
  { name: 'Dubai Opera',     lat: 25.194987, lng: 55.272345, color: '#44ff88' },
  { name: 'Armani Hotel',    lat: 25.196500, lng: 55.273800, color: '#ffaa00' },
  { name: 'Emirates Towers', lat: 25.217345, lng: 55.282123, color: '#ff44ff' },
];

let userLat = 25.2120, userLng = 55.2817;
let heading = 0; // degrees, 0 = North
let headingOk = false;

const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');

// ── Resize canvas to match screen ──
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── Bearing from user to a place (degrees, 0=N, clockwise) ──
function bearing(lat1, lon1, lat2, lon2) {
  const R = Math.PI / 180;
  const dL = (lon2 - lon1) * R;
  const y = Math.sin(dL) * Math.cos(lat2 * R);
  const x = Math.cos(lat1 * R) * Math.sin(lat2 * R)
           - Math.sin(lat1 * R) * Math.cos(lat2 * R) * Math.cos(dL);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// ── Distance in metres ──
function dist(lat1, lon1, lat2, lon2) {
  const R = 6371000, r = Math.PI / 180;
  const dφ = (lat2 - lat1) * r, dλ = (lon2 - lon1) * r;
  const a = Math.sin(dφ/2)**2 + Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Draw one frame ──
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Camera FOV (horizontal) — typical phone ~70°
  const FOV = 70;

  for (const p of PLACES) {
    const brg = bearing(userLat, userLng, p.lat, p.lng);
    const d   = dist(userLat, userLng, p.lat, p.lng);

    // Angular offset from where we're pointing
    let diff = brg - heading;
    if (diff >  180) diff -= 360;
    if (diff < -180) diff += 360;

    // Skip if outside FOV
    if (Math.abs(diff) > FOV / 2) continue;

    // Map diff to screen X  (-FOV/2 = left edge, +FOV/2 = right edge)
    const x = W * (0.5 + diff / FOV);
    // Y fixed at 40% from top
    const y = H * 0.40;

    const label = d < 1000
      ? `${p.name}\n${Math.round(d)}m`
      : `${p.name}\n${(d/1000).toFixed(1)}km`;

    // Outer glow ring
    ctx.beginPath();
    ctx.arc(x, y, 36, 0, Math.PI * 2);
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.3;
    ctx.stroke();

    // Inner filled dot
    ctx.beginPath();
    ctx.arc(x, y, 14, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.85;
    ctx.fill();

    // Label background
    const lines = label.split('\n');
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.roundRect(x - 60, y + 22, 120, 38, 6);
    ctx.fill();

    // Label text
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(lines[0], x, y + 37);
    ctx.font = '11px sans-serif';
    ctx.fillStyle = p.color;
    ctx.fillText(lines[1], x, y + 52);
  }

  ctx.globalAlpha = 1;

  // Centre crosshair
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2, H/2 - 16); ctx.lineTo(W/2, H/2 + 16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2 - 16, H/2); ctx.lineTo(W/2 + 16, H/2); ctx.stroke();

  // Debug info
  document.getElementById('debug').textContent =
    `Heading: ${Math.round(heading)}°  ${headingOk ? '✓ compass' : '⚠ no compass — point N to calibrate'} | ` +
    `GPS: ${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;

  requestAnimationFrame(draw);
}

// ── GPS ──
function initGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
  }, null, { enableHighAccuracy: true });
}

// ── Orientation / compass ──
function initOrientation() {
  const handle = e => {
    let h = null;
    if (typeof e.webkitCompassHeading === 'number' && e.webkitCompassHeading >= 0) {
      // iOS — already true north, clockwise
      h = e.webkitCompassHeading;
    } else if (e.alpha != null && (e.absolute || e.type === 'deviceorientationabsolute')) {
      // Android absolute
      h = (360 - e.alpha) % 360;
    }
    if (h == null) return;
    headingOk = true;
    heading = h;
  };

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+ — needs button tap (already inside start())
    window._orientHandle = handle;
  } else {
    window.addEventListener('deviceorientationabsolute', handle, true);
    window.addEventListener('deviceorientation', handle, true);
  }
}

// ── Start everything ──
async function start() {
  document.getElementById('startBtn').style.display = 'none';

  // Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    });
    document.getElementById('vid').srcObject = stream;
  } catch(e) {
    document.getElementById('debug').textContent = 'Camera denied — using black bg';
  }

  // iOS compass permission
  if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
    try {
      const s = await DeviceOrientationEvent.requestPermission();
      if (s === 'granted' && window._orientHandle) {
        window.addEventListener('deviceorientation', window._orientHandle, true);
      }
    } catch(e) {}
  }

  initGPS();
  initOrientation();
  draw();
}
</script>
</body>
</html>
