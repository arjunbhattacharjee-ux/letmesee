<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AR Simple</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:sans-serif; color:#fff; }
video  { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
canvas { position:fixed; inset:0; width:100%; height:100%; z-index:1; }

.panel {
  position:fixed; inset:0; z-index:10; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:24px; padding:40px 28px; text-align:center;
}
.panel.hidden { display:none; }
h2 { font-size:24px; }
p  { font-size:14px; color:#999; line-height:1.9; max-width:290px; }
em { color:#ffcc00; font-style:normal; font-weight:bold; }

.btn {
  width:100%; max-width:300px; padding:20px;
  font-size:17px; font-weight:bold;
  border:none; border-radius:12px; cursor:pointer;
}
.btn-white  { background:#fff; color:#000; }
.btn-yellow { background:#ffcc00; color:#000; font-size:19px; }

#debug {
  position:fixed; bottom:8px; left:8px; right:8px; z-index:5;
  font-size:11px; color:rgba(255,255,255,0.8);
  background:rgba(0,0,0,0.65); padding:8px 10px;
  border-radius:6px; line-height:2; font-family:monospace;
}
</style>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

<!-- Step 1: Request motion permission (must be a direct user tap on iOS) -->
<div class="panel" id="p1">
  <h2>AR Locator</h2>
  <p>Tap below — iOS requires a <em>direct tap</em> to enable the compass.</p>
  <button class="btn btn-white" id="startBtn" onclick="requestMotion()">Enable Compass &amp; Start</button>
  <p id="status" style="font-size:12px;color:#555"></p>
</div>

<video id="vid" autoplay playsinline muted></video>
<canvas id="cv"></canvas>
<div id="debug">waiting…</div>

<script>
const PLACES = [
  { name:'Burj Khalifa',    lat:25.197197, lng:55.274376, color:'#ff4444' },
  { name:'Dubai Mall',      lat:25.198765, lng:55.279503, color:'#44aaff' },
  { name:'Dubai Opera',     lat:25.194987, lng:55.272345, color:'#44ff88' },
  { name:'Armani Hotel',    lat:25.196500, lng:55.273800, color:'#ffaa00' },
  { name:'Emirates Towers', lat:25.217345, lng:55.282123, color:'#ff44ff' },
];

const canvas = document.getElementById('cv');
const ctx    = canvas.getContext('2d');
let userLat  = 25.2120, userLng = 55.2817;
let compass  = null;  // live heading from webkitCompassHeading
let eventCount = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ── Core orientation handler — reads webkitCompassHeading directly ──
function onOrientation(e) {
  eventCount++;
  if (typeof e.webkitCompassHeading === 'number' && e.webkitCompassHeading >= 0) {
    compass = e.webkitCompassHeading;
  }
}

// ── Request motion permission then start ──
async function requestMotion() {
  document.getElementById('status').textContent = 'Requesting permission…';

  // 1. Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal:'environment' } }, audio: false
    });
    document.getElementById('vid').srcObject = stream;
  } catch(e) {
    document.getElementById('status').textContent = 'Camera denied — continuing without it';
  }

  // 2. Motion — THIS must happen synchronously inside the tap handler
  if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
    try {
      const result = await DeviceOrientationEvent.requestPermission();
      document.getElementById('status').textContent = 'Motion permission: ' + result;
      if (result === 'granted') {
        window.addEventListener('deviceorientation', onOrientation, true);
      } else {
        document.getElementById('status').textContent = 'Motion denied — check Settings > Safari > Motion';
        return; // stay on permission screen
      }
    } catch(e) {
      document.getElementById('status').textContent = 'Error: ' + e.message;
      return;
    }
  } else {
    // Non-iOS: just attach directly
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation',         onOrientation, true);
  }

  // 3. GPS
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      p => { userLat = p.coords.latitude; userLng = p.coords.longitude; },
      null, { enableHighAccuracy: true }
    );
  }

  // 4. Launch AR
  document.getElementById('p1').classList.add('hidden');
  draw();
}

// ── Draw loop ──
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const FOV = 70;

  if (compass !== null) {
    for (const p of PLACES) {
      const brg = bearing(userLat, userLng, p.lat, p.lng);
      const d   = dist(userLat, userLng, p.lat, p.lng);
      let diff  = brg - compass;
      if (diff >  180) diff -= 360;
      if (diff < -180) diff += 360;
      if (Math.abs(diff) > FOV / 2) continue;

      const x = W * (0.5 + diff / FOV);
      const y = H * 0.42;

      // Glow ring
      ctx.globalAlpha = 0.25;
      ctx.beginPath(); ctx.arc(x, y, 38, 0, Math.PI*2);
      ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.stroke();

      // Dot
      ctx.globalAlpha = 0.9;
      ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();

      // Label background
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.beginPath(); ctx.roundRect(x-62, y+22, 124, 38, 6); ctx.fill();

      // Label text
      ctx.globalAlpha = 1; ctx.textAlign = 'center';
      ctx.font = 'bold 12px sans-serif'; ctx.fillStyle = '#fff';
      ctx.fillText(p.name, x, y+37);
      ctx.font = '11px sans-serif'; ctx.fillStyle = p.color;
      ctx.fillText(fmtDist(d), x, y+52);
    }
  }

  // Crosshair
  ctx.globalAlpha = 0.4; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2,H/2-18); ctx.lineTo(W/2,H/2+18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2-18,H/2); ctx.lineTo(W/2+18,H/2); ctx.stroke();
  ctx.globalAlpha = 1;

  document.getElementById('debug').textContent =
    `compass: ${compass !== null ? Math.round(compass)+'°' : 'waiting'} | events: ${eventCount} | gps: ${userLat.toFixed(4)},${userLng.toFixed(4)}`;

  requestAnimationFrame(draw);
}

function bearing(la1,lo1,la2,lo2) {
  const R=Math.PI/180, dL=(lo2-lo1)*R;
  const y=Math.sin(dL)*Math.cos(la2*R);
  const x=Math.cos(la1*R)*Math.sin(la2*R)-Math.sin(la1*R)*Math.cos(la2*R)*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function dist(la1,lo1,la2,lo2) {
  const R=6371000,r=Math.PI/180;
  const dφ=(la2-la1)*r, dλ=(lo2-lo1)*r;
  const a=Math.sin(dφ/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m) { return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km'; }
</script>
</body>
</html>
