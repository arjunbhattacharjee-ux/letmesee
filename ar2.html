<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AR Eats</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --accent: #FF3B30;
    --accent2: #FF9F0A;
    --glass: rgba(10,10,12,0.72);
    --glass-light: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --text-dim: rgba(255,255,255,0.55);
    --radius: 18px;
    --font: 'DM Sans', 'Helvetica Neue', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: var(--font);
    color: var(--text);
    touch-action: none;
  }

  /* ── camera feed ── */
  #video {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(1);
  }

  /* ── AR canvas ── */
  #ar-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* ── dot hit targets (invisible, for touch) ── */
  #dot-layer {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
  }

  .dot-hit {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 56px; height: 56px;
    border-radius: 50%;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── HUD top bar ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    padding: env(safe-area-inset-top, 16px) 20px 14px;
    padding-top: calc(env(safe-area-inset-top, 16px) + 14px);
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
    pointer-events: none;
    z-index: 10;
  }

  #app-title {
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.5px;
  }
  #app-title span { color: var(--accent); }

  #status-pill {
    font-size: 12px; font-weight: 500;
    padding: 5px 12px; border-radius: 20px;
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255,255,255,0.15);
    pointer-events: none;
  }

  /* ── compass ring ── */
  #compass-wrap {
    position: fixed; bottom: 120px; right: 20px;
    width: 52px; height: 52px;
    z-index: 10;
  }
  #compass-svg { width: 100%; height: 100%; transition: transform 0.15s ease; }

  /* ── count badge ── */
  #count-badge {
    position: fixed; bottom: 120px; left: 20px;
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 10px 16px;
    z-index: 10;
    font-size: 13px; color: var(--text-dim);
  }
  #count-badge strong { color: var(--text); font-weight: 600; font-size: 18px; display: block; }

  /* ── permission / loading screen ── */
  #splash {
    position: fixed; inset: 0;
    background: #0a0a0c;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; z-index: 100;
    padding: 40px;
    text-align: center;
  }

  .splash-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

  .splash-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .splash-title span { color: var(--accent); }
  .splash-sub { font-size: 15px; color: var(--text-dim); line-height: 1.6; max-width: 300px; }

  .btn-primary {
    background: var(--accent);
    color: #fff; border: none;
    font-family: var(--font);
    font-size: 16px; font-weight: 600;
    padding: 16px 36px; border-radius: 50px;
    cursor: pointer; width: 100%; max-width: 280px;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.2px;
  }
  .btn-primary:active { opacity: 0.85; transform: scale(0.97); }

  .btn-secondary {
    background: var(--glass-light);
    color: var(--text-dim); border: 0.5px solid rgba(255,255,255,0.2);
    font-family: var(--font);
    font-size: 14px; font-weight: 500;
    padding: 12px 28px; border-radius: 50px;
    cursor: pointer; width: 100%; max-width: 280px;
    transition: opacity 0.15s;
  }

  /* ── loading spinner ── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    z-index: 90;
  }
  #loading-overlay.active { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── info panel ── */
  #info-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--glass);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 0.5px solid rgba(255,255,255,0.12);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 0 20px 20px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    z-index: 50;
    transform: translateY(100%);
    transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
    max-height: 80vh;
    overflow-y: auto;
  }
  #info-panel.open { transform: translateY(0); }

  .panel-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    margin: 12px auto 18px;
  }

  #panel-category {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  #panel-name {
    font-size: 24px; font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .panel-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    font-size: 14px; color: var(--text-dim);
  }
  .panel-row:last-child { border-bottom: none; }
  .panel-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .panel-val { color: var(--text); }

  .stars { color: var(--accent2); letter-spacing: 1px; }

  .tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag {
    font-size: 12px; font-weight: 500;
    padding: 4px 12px; border-radius: 20px;
    background: var(--glass-light);
    border: 0.5px solid rgba(255,255,255,0.15);
    color: var(--text-dim);
  }

  .dist-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    font-size: 13px; font-weight: 600;
    padding: 5px 14px; border-radius: 20px;
    margin-bottom: 14px;
  }

  .close-btn {
    position: absolute; top: 16px; right: 20px;
    width: 30px; height: 30px;
    background: var(--glass-light);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--text-dim);
    cursor: pointer;
    line-height: 1;
  }

  /* ── calibration toast ── */
  #calib-toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 13px; color: var(--text-dim);
    white-space: nowrap;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #calib-toast.show { opacity: 1; }

  /* ── crosshair ── */
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 24px; height: 24px;
    pointer-events: none;
    z-index: 5;
    opacity: 0.4;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: #fff;
  }
  #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  #crosshair::after  { width: 100%; height: 1px; top: 50%; left: 0; }

  /* ── refresh btn ── */
  #refresh-btn {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255,255,255,0.2);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px; font-weight: 500;
    padding: 12px 24px; border-radius: 50px;
    cursor: pointer; z-index: 10;
    display: flex; align-items: center; gap: 8px;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  #refresh-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<!-- camera -->
<video id="video" autoplay playsinline muted></video>

<!-- AR overlay canvas -->
<canvas id="ar-canvas"></canvas>

<!-- tap targets -->
<div id="dot-layer"></div>

<!-- crosshair -->
<div id="crosshair"></div>

<!-- HUD -->
<div id="hud">
  <div id="app-title">AR<span>Eats</span></div>
  <div id="status-pill">Initializing…</div>
</div>

<!-- compass -->
<div id="compass-wrap">
  <svg id="compass-svg" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="26" cy="26" r="25" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <circle cx="26" cy="26" r="25" fill="rgba(10,10,12,0.6)"/>
    <text x="26" y="11" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.4)" font-family="DM Sans,sans-serif">N</text>
    <text x="26" y="45" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.4)" font-family="DM Sans,sans-serif">S</text>
    <text x="9"  y="29" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.4)" font-family="DM Sans,sans-serif">W</text>
    <text x="44" y="29" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.4)" font-family="DM Sans,sans-serif">E</text>
    <!-- needle -->
    <polygon id="compass-needle-n" points="26,8 23,26 29,26" fill="#FF3B30"/>
    <polygon id="compass-needle-s" points="26,44 23,26 29,26" fill="rgba(255,255,255,0.3)"/>
    <circle cx="26" cy="26" r="3" fill="#fff"/>
  </svg>
</div>

<!-- count -->
<div id="count-badge">
  <strong id="place-count">0</strong>
  nearby places
</div>

<!-- info panel -->
<div id="info-panel">
  <div class="panel-handle"></div>
  <div class="close-btn" id="close-panel">✕</div>
  <div id="panel-category"></div>
  <div id="panel-name"></div>
  <div class="dist-badge"><span>📍</span><span id="panel-dist"></span></div>
  <div class="tag-row" id="panel-tags"></div>
  <div id="panel-rows"></div>
</div>

<!-- loading -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div style="font-size:14px;color:rgba(255,255,255,0.5)">Loading places…</div>
</div>

<!-- splash -->
<div id="splash">
  <div class="splash-icon">🍽️</div>
  <div class="splash-title">AR<span>Eats</span></div>
  <div class="splash-sub">Point your camera to discover restaurants and cafés around you in augmented reality.</div>
  <button class="btn-primary" id="start-btn">Enable Camera & Location</button>
  <button class="btn-secondary" id="demo-btn">Try Demo Mode</button>
  <div style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:8px">Requires HTTPS • Camera • GPS • Compass</div>
</div>

<!-- calibration toast -->
<div id="calib-toast">Wave phone in a figure-8 to calibrate compass</div>

<!-- refresh -->
<button id="refresh-btn" style="display:none">
  <span>&#x21BA;</span> Refresh Places
</button>

<!-- debug toggle -->
<button id="debug-toggle" style="position:fixed;bottom:40px;right:20px;background:rgba(10,10,12,0.8);color:rgba(255,255,255,0.5);border:0.5px solid rgba(255,255,255,0.15);border-radius:50px;font-size:12px;padding:8px 14px;cursor:pointer;z-index:15;font-family:inherit;display:none;">&#128269; Debug</button>

<!-- debug panel -->
<div id="debug-panel" style="display:none;position:fixed;top:80px;left:10px;right:10px;bottom:auto;max-height:55vh;overflow-y:auto;background:rgba(0,0,0,0.92);color:#00ff88;font-family:monospace;font-size:11px;line-height:1.6;padding:10px 12px;border-radius:10px;z-index:80;border:0.5px solid rgba(0,255,136,0.3);white-space:pre-wrap;word-break:break-all;"></div>

<script>
// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
const state = {
  lat: null, lon: null,
  heading: 0,
  rawHeading: 0,
  headingReceived: false,   // true once compass fires at least once
  places: [],
  demoMode: false,
  ready: false,
  permOrientation: false,
};

// Low-pass filter alpha (higher = smoother but laggier)
const SMOOTH = 0.12;
const FOV_H  = 65;   // assumed horizontal FOV degrees
const MAX_DIST = 1500; // FIX: 500m too small for Fujairah/sparse cities — 1500m

// Overpass mirrors — ordered by UAE reliability.
// overpass-api.de is blocked by some UAE ISPs (fails in <1s with "Load failed").
// kumi.systems and private.coffee are European mirrors that work reliably from UAE.
const OVERPASS_MIRRORS = [
  'https://overpass.kumi.systems/api/interpreter',
  'https://overpass.private.coffee/api/interpreter',
  'https://overpass-api.de/api/interpreter',
  'https://overpass.openstreetmap.ru/api/interpreter',
];

// If a mirror fails in under this many ms, it's probably network-blocked (not just slow).
// Skip it immediately rather than burning the full 30s timeout.
const INSTANT_FAIL_MS = 2000;

// ─────────────────────────────────────────────
//  Utilities
// ─────────────────────────────────────────────
function toRad(d){ return d * Math.PI / 180; }
function toDeg(r){ return r * 180 / Math.PI; }

function haversine(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearing(lat1, lon1, lat2, lon2){
  const dLon = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1))*Math.sin(toRad(lat2)) - Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dLon);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function angleDiff(a, b){
  let d = ((a - b) + 180) % 360 - 180;
  if(d < -180) d += 360;
  return d;
}

function smoothAngle(current, target, alpha){
  // handle wrap-around
  let diff = angleDiff(target, current);
  return (current + alpha * diff + 360) % 360;
}

function formatDist(m){
  if(m < 1000) return Math.round(m) + ' m';
  return (m/1000).toFixed(1) + ' km';
}

function formatCategory(tags){
  if(tags.cuisine) return tags.cuisine.split(';')[0].replace(/_/g,' ');
  if(tags.amenity === 'cafe') return 'Café';
  if(tags.amenity === 'fast_food') return 'Fast Food';
  if(tags.amenity === 'restaurant') return 'Restaurant';
  if(tags.amenity === 'bar') return 'Bar';
  return 'Eatery';
}

function getTypeEmoji(tags){
  if(tags.amenity === 'cafe') return '☕';
  if(tags.amenity === 'fast_food') return '🍔';
  if(tags.amenity === 'bar') return '🍺';
  return '🍽️';
}

// ─────────────────────────────────────────────
//  DOM refs
// ─────────────────────────────────────────────
const video      = document.getElementById('video');
const canvas     = document.getElementById('ar-canvas');
const ctx        = canvas.getContext('2d');
const dotLayer   = document.getElementById('dot-layer');
const splash     = document.getElementById('splash');
const statusPill = document.getElementById('status-pill');
const loadOverlay= document.getElementById('loading-overlay');
const infoPanel  = document.getElementById('info-panel');
const compassSVG = document.getElementById('compass-svg');
const calibToast = document.getElementById('calib-toast');
const placeCount = document.getElementById('place-count');
const refreshBtn = document.getElementById('refresh-btn');

// ─────────────────────────────────────────────
//  Canvas sizing
// ─────────────────────────────────────────────
function resizeCanvas(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─────────────────────────────────────────────
//  Debug log — visible on device screen
// ─────────────────────────────────────────────
const debugLines = [];
function dbg(msg){
  const t = new Date().toISOString().slice(11,19);
  debugLines.push(t + ' ' + msg);
  if(debugLines.length > 28) debugLines.shift();
  const el = document.getElementById('debug-panel');
  if(el) el.innerText = debugLines.join('\n');
  console.log('[AR]', msg);
}

// ─────────────────────────────────────────────
//  OSM Overpass fetch  (fully instrumented)
// ─────────────────────────────────────────────
async function fetchPlaces(lat, lon){
  if(lat == null || lon == null){
    statusPill.textContent = 'Waiting for GPS…';
    dbg('GPS null — aborting fetch');
    return;
  }

  // ── sessionStorage cache (keyed to 0.01° grid ≈ 1 km) ──
  const cacheKey = 'arplaces_' + lat.toFixed(2) + '_' + lon.toFixed(2);
  try {
    const cached = sessionStorage.getItem(cacheKey);
    if(cached){
      const parsed = JSON.parse(cached);
      if(Array.isArray(parsed) && parsed.length > 0){
        state.places = parsed.map(p => ({ ...p, dist: haversine(lat, lon, p.lat, p.lon) }));
        placeCount.textContent = state.places.length;
        statusPill.textContent = state.places.length + ' places nearby (cached)';
        dbg('Cache hit — ' + state.places.length + ' places, skipping network');
        showCalibToast();
        return;
      }
    }
  } catch(e){ dbg('Cache read error: ' + e.message); }

  dbg('fetch lat=' + lat.toFixed(5) + ' lon=' + lon.toFixed(5) + ' r=' + MAX_DIST + 'm');
  // No full-screen overlay — show progress inline in the status pill so the
  // user can see what's happening and still tap Refresh at any time.
  loadOverlay.classList.remove('active');

  const query = '[out:json][timeout:30];(node["amenity"~"restaurant|cafe|fast_food|bar"](around:' + MAX_DIST + ',' + lat + ',' + lon + ');way["amenity"~"restaurant|cafe|fast_food|bar"](around:' + MAX_DIST + ',' + lat + ',' + lon + '););out center tags;';
  const body = 'data=' + encodeURIComponent(query);

  let data = null;
  let lastError = '';

  for(let i = 0; i < OVERPASS_MIRRORS.length; i++){
    const mirror = OVERPASS_MIRRORS[i];
    const host = mirror.replace('https://','').split('/')[0];
    statusPill.textContent = '⏳ Searching ' + (i+1) + '/' + OVERPASS_MIRRORS.length + '…';
    dbg('Trying ' + host);
    const t0 = Date.now();
    try {
      const res = await fetch(mirror, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body,
        signal: AbortSignal.timeout(30000),
      });
      dbg('HTTP ' + res.status + ' from ' + host + ' (' + (Date.now()-t0) + 'ms)');
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      dbg('Body ' + text.length + ' chars');
      if(text.length < 10) throw new Error('Empty body');
      data = JSON.parse(text);
      dbg('elements=' + (data.elements ? data.elements.length : 'missing'));
      if(data && Array.isArray(data.elements)) break;
      throw new Error('No elements array');
    } catch(e){
      const elapsed = Date.now() - t0;
      const reason = elapsed < INSTANT_FAIL_MS ? 'BLOCKED' : 'TIMEOUT/ERR';
      lastError = e.message;
      dbg('FAIL [' + reason + ' ' + elapsed + 'ms]: ' + host + ' — ' + e.message);
    }
  }

  if(!data || !Array.isArray(data.elements)){
    statusPill.textContent = '⚠️ No server responded';
    showErrorToast('All OSM servers failed (' + lastError + '). Retrying in 15s — or tap Refresh now.');
    dbg('All mirrors failed — auto-retry in 15s');
    fetchFailed = true;
    setTimeout(() => {
      if(state.lat !== null && !state.demoMode){
        dbg('Auto-retry fetch after server failure');
        fetchPlaces(state.lat, state.lon);
      }
    }, 15000);
    return;
  }

  dbg('Raw elements: ' + data.elements.length);
  data.elements.slice(0,3).forEach(function(el,i){
    dbg('  [' + i + '] ' + el.type + ' "' + (el.tags && el.tags.name || '?') + '" ' + (el.lat || (el.center && el.center.lat)));
  });

  const mapped = data.elements.map(function(el){
    const elLat = el.lat != null ? el.lat : (el.center && el.center.lat);
    const elLon = el.lon != null ? el.lon : (el.center && el.center.lon);
    if(elLat == null || elLon == null) return null;
    return {
      id: el.id, osmType: el.type || 'node',
      name: (el.tags && el.tags.name) || 'Unnamed Place',
      lat: elLat, lon: elLon,
      tags: el.tags || {},
      dist: haversine(lat, lon, elLat, elLon),
    };
  });

  const afterNull   = mapped.filter(Boolean);
  const afterRadius = afterNull.filter(function(p){ return p.dist <= MAX_DIST; });
  const sorted      = afterRadius.sort(function(a,b){ return a.dist - b.dist; }).slice(0, 60);

  dbg('afterNull=' + afterNull.length + ' afterRadius=' + afterRadius.length + ' final=' + sorted.length);

  if(afterNull.length > 0 && afterRadius.length === 0){
    const cl = afterNull.sort(function(a,b){return a.dist-b.dist;})[0];
    dbg('Closest filtered-out: "' + cl.name + '" ' + cl.dist.toFixed(0) + 'm');
  }

  state.places = sorted;
  placeCount.textContent = sorted.length;

  // ── Write to cache so next load is instant ──
  if(sorted.length > 0){
    try { sessionStorage.setItem(cacheKey, JSON.stringify(sorted)); }
    catch(e){ dbg('Cache write error: ' + e.message); }
  }

  if(sorted.length === 0){
    statusPill.textContent = '0 places — tap Refresh to widen';
    showErrorToast('0 places within ' + (MAX_DIST/1000).toFixed(1) + ' km. See debug panel. Tap Refresh to widen search.');
  } else {
    statusPill.textContent = sorted.length + ' places nearby';
    dbg('compass=' + (state.headingReceived ? 'OK heading='+state.heading.toFixed(1) : 'NOT RECEIVED — radar mode active'));
    showCalibToast();
  }
}

// ─────────────────────────────────────────────
//  Compass
// ─────────────────────────────────────────────
let orientationCount = 0;          // count of real events received
let lastRealHeading = null;        // last accepted raw heading

function handleOrientation(e){
  let h;

  // webkitCompassHeading is true-north referenced on iOS — use it directly.
  // Do NOT filter by webkitCompassAccuracy — the value varies wildly by device
  // and environment and rejects valid readings on most iPhones outdoors.
  if(typeof e.webkitCompassHeading === 'number' && e.webkitCompassHeading >= 0){
    h = e.webkitCompassHeading;
  } else if(e.alpha !== null && e.alpha !== undefined){
    h = (360 - e.alpha) % 360;
  } else {
    return;
  }

  orientationCount++;

  // First real event: jump straight to it, skip smoothing
  if(!state.headingReceived){
    state.heading = h;
    state.headingReceived = true;
    lastRealHeading = h;
    dbg('compass first fix: ' + h.toFixed(1) + '° acc=' + (e.webkitCompassAccuracy ?? 'n/a'));
  } else {
    // Only smooth if heading actually changed (reject duplicate 0,0,0 spam)
    if(lastRealHeading === null || Math.abs(angleDiff(h, lastRealHeading)) > 0.3){
      // For large heading jumps (>60°), snap halfway immediately to avoid
      // the compass "spinning the long way round" artefact seen in the debug log
      // (e.g. raw jumps 271° → 93.5° in one event).
      const jump = Math.abs(angleDiff(h, state.heading));
      const alpha = jump > 60 ? 0.6 : 0.25;
      if(jump > 60) dbg('compass jump ' + jump.toFixed(0) + '° → snap (alpha=0.6)');
      lastRealHeading = h;
      state.heading = smoothAngle(state.heading, h, alpha);
    }
  }

  // Update compass rose
  compassSVG.style.transform = 'rotate(' + (-state.heading) + 'deg)';

  // Log to debug panel every 3s
  const now2 = Date.now();
  if(!state._lastHeadingLog || now2 - state._lastHeadingLog > 3000){
    state._lastHeadingLog = now2;
    dbg('heading=' + state.heading.toFixed(1) + '° raw=' + h.toFixed(1) + '° events=' + orientationCount);
  }
}

// Re-register orientation listeners (call after permission grant AND periodically,
// since iOS Safari sometimes silently drops the listeners)
function registerOrientationListeners(){
  window.removeEventListener('deviceorientationabsolute', handleOrientation, true);
  window.removeEventListener('deviceorientation', handleOrientation, true);
  window.addEventListener('deviceorientationabsolute', handleOrientation, true);
  window.addEventListener('deviceorientation', handleOrientation, true);
}

async function requestOrientationPermission(){
  if(typeof DeviceOrientationEvent !== 'undefined' &&
     typeof DeviceOrientationEvent.requestPermission === 'function'){
    // iOS 13+ requires explicit permission from a user gesture
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      dbg('orientation permission: ' + perm);
      if(perm === 'granted'){
        registerOrientationListeners();
        state.permOrientation = true;
        // Re-register every 10s as a safeguard against iOS dropping listeners
        setInterval(registerOrientationListeners, 10000);
      } else {
        dbg('compass: permission denied — radar mode will stay active');
      }
    } catch(err){
      dbg('compass permission error: ' + err.message);
    }
  } else {
    // Android / non-iOS — no permission needed
    registerOrientationListeners();
    state.permOrientation = true;
    dbg('compass: no permission needed, listeners registered');
  }
}

// ─────────────────────────────────────────────
//  Geolocation
//
//  kCLErrorDomain error 0 = iOS can't get a high-accuracy GPS fix (indoors /
//  weak signal). Strategy:
//
//  Phase 1 — HIGH accuracy, 2 attempts.
//  Phase 2 — LOW accuracy (WiFi/cell tower triangulation), 2 attempts.
//            This almost always succeeds indoors.
//  Phase 3 — Accept a CACHED position (maximumAge up to 5 min).
//  Phase 4 — Prompt user to enter location manually.
//
//  Once ANY position is accepted we keep a persistent watchPosition running
//  at low accuracy so iOS keeps delivering updates without killing the watch.
// ─────────────────────────────────────────────
let gpsWatchId     = null;
let gpsFetched     = false;
let fetchFailed    = false;
let gpsRetryTimer  = null;
let gpsWatchActive = false;
let gpsFailCount   = 0;
let gpsPhase       = 'high';   // 'high' | 'low' | 'cached' | 'manual'
const GPS_HIGH_MAX = 2;        // attempts before dropping to low accuracy
const GPS_LOW_MAX  = 2;        // attempts before trying cached position

function clearGPSWatch(){
  if(gpsWatchId !== null){
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
  }
  if(gpsRetryTimer !== null){
    clearTimeout(gpsRetryTimer);
    gpsRetryTimer = null;
  }
  gpsWatchActive = false;
}

// ── Manual location prompt (shown after all GPS phases fail) ──
function showManualLocationPrompt(){
  if(document.getElementById('manual-loc-prompt')) return;
  const overlay = document.createElement('div');
  overlay.id = 'manual-loc-prompt';
  overlay.style.cssText = `

    display:flex; flex-direction:column; align-items:center;

    text-align:center; z-index:200;
  `;
  overlay.innerHTML = `

    <div style="font-size:13px;color:rgba(255,255,255,0.55);max-width:280px;line-height:1.6">

    </div>

      style="width:100%;max-width:300px;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);

    <button id="manual-loc-go" style="background:#FF3B30;color:#fff;border:none;

      font-family:inherit;cursor:pointer;width:100%;max-width:300px;">Search This Location</button>
    <button id="manual-loc-retry" style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);
      border:0.5px solid rgba(255,255,255,0.2);border-radius:50px;padding:12px 28px;
      font-size:14px;font-family:inherit;cursor:pointer;width:100%;max-width:300px;">
      Try GPS Again (go outside first)
    </button>
  `;
  document.body.appendChild(overlay);

  document.getElementById('manual-loc-go').addEventListener('click', async () => {
    const query = document.getElementById('manual-loc-input').value.trim();
    if(!query) return;
    statusPill.textContent = 'Searching…';

      const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(query);
      const r = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      const results = await r.json();
      if(!results || results.length === 0){
        statusPill.textContent = 'Location not found';
        showErrorToast('Could not find "' + query + '". Try a more specific address.');

  document.getElementById('manual-loc-retry').addEventListener('click', () => {
    overlay.remove();
    gpsFailCount = 0;
    gpsPhase = 'high';
    clearGPSWatch();

  });

function startGPSWatch(){
  if(!navigator.geolocation){
    dbg('ERROR: navigator.geolocation not available');
    statusPill.textContent = 'GPS not available on this device';
    return;
  }
  if(gpsWatchActive) return;
  gpsWatchActive = true;

  // Choose options based on current phase
  let opts;
  if(gpsPhase === 'high'){
    opts = { enableHighAccuracy: true,  maximumAge: 0,       timeout: 12000 };
    dbg('GPS phase=HIGH attempt ' + (gpsFailCount + 1) + '/' + GPS_HIGH_MAX);
    statusPill.textContent = 'Getting GPS fix…';
  } else if(gpsPhase === 'low'){
    opts = { enableHighAccuracy: false, maximumAge: 0,       timeout: 12000 };
    dbg('GPS phase=LOW (WiFi/cell) attempt ' + (gpsFailCount + 1) + '/' + GPS_LOW_MAX);
    statusPill.textContent = 'Getting location (indoor)…';
  } else if(gpsPhase === 'cached'){
    opts = { enableHighAccuracy: false, maximumAge: 300000,  timeout: 8000  };
    dbg('GPS phase=CACHED (accepting up to 5-min-old position)');
    statusPill.textContent = 'Using last known location…';
  }

  // Pulsing dots while waiting
  let dots = 0;
  const pulseBase = statusPill.textContent.replace(/\.+$/, '');
  const gpsTimer = setInterval(() => {
    if(state.lat !== null){ clearInterval(gpsTimer); return; }
    dots = (dots + 1) % 4;
    statusPill.textContent = pulseBase + '.'.repeat(dots + 1);
  }, 600);

  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      // ── SUCCESS ──
      clearInterval(gpsTimer);
      if(gpsRetryTimer){ clearTimeout(gpsRetryTimer); gpsRetryTimer = null; }
      gpsFailCount = 0;
      gpsPhase = 'high'; // reset phase on success

      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const acc = Math.round(pos.coords.accuracy);
      const age = Math.round((Date.now() - pos.timestamp) / 1000);
      dbg('GPS fix: ' + lat.toFixed(5) + ',' + lon.toFixed(5) + ' acc=' + acc + 'm age=' + age + 's');

      state.lat = lat;
      state.lon = lon;
      state.places.forEach(p => { p.dist = haversine(state.lat, state.lon, p.lat, p.lon); });

      if(!gpsFetched){
        gpsFetched = true;
        fetchPlaces(lat, lon);
      } else if(fetchFailed){
        fetchFailed = false;
        dbg('GPS re-fix after failed fetch — retrying fetchPlaces');
        fetchPlaces(lat, lon);
      }

      // Keep a low-accuracy watch alive so iOS doesn't kill GPS
      if(opts.enableHighAccuracy){
        clearGPSWatch();
        gpsWatchActive = true;
        gpsWatchId = navigator.geolocation.watchPosition(
          p2 => {
            state.lat = p2.coords.latitude;
            state.lon = p2.coords.longitude;
            state.places.forEach(p => { p.dist = haversine(state.lat, state.lon, p.lat, p.lon); });
          },
          () => {}, // silent errors on the keepalive watch
          { enableHighAccuracy: false, maximumAge: 30000, timeout: 30000 }
        );
      }
    },
    err => {
      // ── ERROR ──
      clearInterval(gpsTimer);
      const codes = {1:'PERMISSION_DENIED', 2:'POSITION_UNAVAILABLE', 3:'TIMEOUT'};
      dbg('GPS error [' + gpsPhase + ']: ' + (codes[err.code]||'ERR_'+err.code));

      if(err.code === 1){
        clearGPSWatch();
        statusPill.textContent = '📍 Location access denied';
        showErrorToast('Location permission denied. Enable it in Settings → Safari → Location → Allow.');
        return;
      }

      gpsFailCount++;
      clearGPSWatch(); // sets gpsWatchActive = false

      // Advance phase when we've exhausted attempts at current phase
      if(gpsPhase === 'high' && gpsFailCount >= GPS_HIGH_MAX){
        gpsPhase = 'low';
        gpsFailCount = 0;
        dbg('Switching to LOW accuracy mode');
        gpsRetryTimer = setTimeout(() => { gpsRetryTimer = null; startGPSWatch(); }, 1000);
      } else if(gpsPhase === 'low' && gpsFailCount >= GPS_LOW_MAX){
        gpsPhase = 'cached';
        gpsFailCount = 0;
        dbg('Trying cached position');
        gpsRetryTimer = setTimeout(() => { gpsRetryTimer = null; startGPSWatch(); }, 500);
      } else if(gpsPhase === 'cached'){
        // All phases exhausted — show manual entry
        dbg('All GPS phases failed — showing manual location prompt');
        if(state.lat === null) showManualLocationPrompt();
      } else {
        // Retry within same phase with short delay
        const delay = gpsPhase === 'high' ? [3,6][gpsFailCount-1]||8 : 3;
        dbg('GPS retry in ' + delay + 's (phase=' + gpsPhase + ' fail #' + gpsFailCount + ')');
        statusPill.textContent = 'GPS retrying…';
        gpsRetryTimer = setTimeout(() => { gpsRetryTimer = null; startGPSWatch(); }, delay * 1000);
      }
    },
    opts
  );
}

// When the user brings the page back to foreground, reset and restart GPS
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && state.ready){
    dbg('Page visible — resetting GPS');
    gpsFailCount = 0;
    gpsPhase = 'high';
    clearGPSWatch();
    startGPSWatch();
  }
});

// Also restart on pageshow (handles iOS Safari back-forward cache restore)
window.addEventListener('pageshow', e => {
  if(e.persisted && state.ready){
    dbg('pageshow (persisted) — restarting GPS');
    gpsFailCount = 0;
    gpsPhase = 'high';
    clearGPSWatch();
    startGPSWatch();
  }
});

async function startReal(){
  if(location.protocol !== 'https:' && location.hostname !== 'localhost'){
    splash.style.display = 'none';
    const msg = document.createElement('div');
    msg.style.cssText = 'position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center;background:#0a0a0c;z-index:200;';
    msg.innerHTML = '<div style="font-size:40px">\u{1F512}</div><div style="font-size:18px;font-weight:600">HTTPS required</div><div style="font-size:14px;color:rgba(255,255,255,0.5);max-width:280px">Camera, GPS, and compass only work on secure (HTTPS) connections.</div>';
    document.body.appendChild(msg);
    return;
  }

  splash.style.display = 'none';
  statusPill.textContent = 'Requesting camera…';

  // Start camera + compass in parallel, then GPS in background
  await Promise.all([
    startCamera(),
    requestOrientationPermission()
  ]);

  // App is ready to render immediately — GPS arrives async
  state.ready = true;
  refreshBtn.style.display = 'flex';
  document.getElementById('debug-toggle').style.display = 'block';
  requestAnimationFrame(renderLoop);

  // Start GPS watch — non-blocking, calls fetchPlaces when fix arrives
  startGPSWatch();
  dbg('App ready. Waiting for GPS fix…');
}

// ─────────────────────────────────────────────
//  AR Render loop
// ─────────────────────────────────────────────
const W = () => canvas.width;
const H = () => canvas.height;

// dot info cache per frame
let frameDots = [];

function renderLoop(){
  requestAnimationFrame(renderLoop);
  if(!state.ready) return;

  ctx.clearRect(0, 0, W(), H());
  frameDots = [];

  // If compass has never fired, show a wide "radar" view so dots are visible
  // regardless of heading — user can still tap them.
  const compassReady = state.headingReceived;
  const heading = state.heading;

  // In radar mode use 360° FOV so ALL places render spread across the screen
  const activeFOV = compassReady ? FOV_H : 360;
  const halfFOV = activeFOV / 2;
  const cx = W() / 2;
  const cy = H() / 2;

  // Show compass-unavailable hint
  if(!compassReady && state.places.length > 0){
    ctx.font = '500 13px DM Sans, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fillText('Compass unavailable — showing all nearby places', cx, H() - 80);
    ctx.fillText('Rotate phone to enable AR mode', cx, H() - 60);
  }

  const now = Date.now();

  for(const place of state.places){
    if(!state.lat) break;
    const bear = bearing(state.lat, state.lon, place.lat, place.lon);
    const diff = compassReady ? angleDiff(bear, heading) : angleDiff(bear, heading);

    // In radar mode spread all places evenly across screen width
    const bufFOV = halfFOV + 8;
    if(compassReady && Math.abs(diff) > bufFOV) continue;
    // In radar mode: map full 360° to screen width
    if(!compassReady && Math.abs(diff) > 180) continue;

    const x = cx + (diff / halfFOV) * cx;

    // distFactor: 1.0 = very close, 0.0 = at MAX_DIST
    const distFactor = Math.max(0, 1 - place.dist / MAX_DIST);

    // Y: closer places sit higher on screen (like AR perspective).
    // Spread across 20%–75% of screen height so dots aren't all on one line.
    // A small deterministic jitter per place breaks ties when many share same distance.
    const rank = state.places.indexOf(place);
    const jitter = ((rank * 37 + 13) % 60) - 30; // –30..+30 px, stable per place
    const yBase = H() * 0.75 - distFactor * H() * 0.50; // far=75%, close=25%
    const y = yBase + jitter;

    // Size: closer = bigger, kept compact
    const baseSize = 6 + distFactor * 8;  // range 6–14px radius

    // Edge fade
    const edgeFade = Math.max(0, 1 - Math.abs(diff) / bufFOV);
    const alpha = edgeFade * (0.75 + distFactor * 0.25);

    // Subtle pulse only for the single closest place
    const pulse = rank === 0 ? 1 + 0.12 * Math.sin(now / 700) : 1;
    const r = baseSize * pulse;

    // Determine solid color by amenity
    let dotColor;
    const a = place.tags.amenity;
    if(a === 'cafe')           dotColor = `rgba(255,159,10,${alpha})`;
    else if(a === 'fast_food') dotColor = `rgba(255,69,58,${alpha})`;
    else if(a === 'bar')       dotColor = `rgba(48,209,88,${alpha})`;
    else                       dotColor = `rgba(255,59,48,${alpha})`;

    // Solid filled dot
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = dotColor;
    ctx.fill();

    // Thin white border so dot reads against any background
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.6})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Name label — always above the dot
    {
      ctx.font = `600 12px 'DM Sans', sans-serif`;
      ctx.textAlign = 'center';
      const nameW = ctx.measureText(place.name).width + 14;
      const nameY = y - r - 8;

      // Dark pill background
      ctx.beginPath();
      ctx.roundRect(x - nameW/2, nameY - 14, nameW, 18, 9);
      ctx.fillStyle = `rgba(0,0,0,${edgeFade * 0.68})`;
      ctx.fill();

      // Name text
      ctx.fillStyle = `rgba(255,255,255,${edgeFade * alpha})`;
      ctx.fillText(place.name, x, nameY);
    }

    // Distance label — always below the dot
    {
      ctx.font = `500 10px 'DM Sans', sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(255,255,255,${edgeFade * alpha * 0.8})`;
      ctx.fillText(formatDist(place.dist), x, y + r + 13);
    }

    frameDots.push({ place, x, y, r: r + 16 });
  }

  // Rebuild hit targets
  rebuildHitTargets();

  // Log render stats every 4s
  const now4 = Date.now();
  if(!state._lastRenderLog || now4 - state._lastRenderLog > 4000){
    state._lastRenderLog = now4;
    if(state.places.length > 0){
      dbg('render: ' + frameDots.length + ' dots visible / ' + state.places.length + ' total | compass=' + (state.headingReceived ? 'OK' : 'NO'));
    }
  }
}

// ─────────────────────────────────────────────
//  Hit targets
//  Rebuilt every frame so tap zones track dot
//  positions as the phone rotates. We reuse
//  existing DOM nodes to avoid layout thrash.
// ─────────────────────────────────────────────
function rebuildHitTargets(){
  const existing = dotLayer.children;

  // Remove surplus nodes
  while(dotLayer.children.length > frameDots.length){
    dotLayer.removeChild(dotLayer.lastChild);
  }

  frameDots.forEach((d, i) => {
    let el = existing[i];
    if(!el){
      el = document.createElement('div');
      el.className = 'dot-hit';
      // Store place reference on element to avoid re-adding listeners
      el._openHandler = null;
      dotLayer.appendChild(el);
    }

    const size = Math.max(56, d.r * 2);
    el.style.left   = d.x + 'px';
    el.style.top    = d.y + 'px';
    el.style.width  = size + 'px';
    el.style.height = size + 'px';

    // Only rewire listeners when the place changes
    if(el._place !== d.place){
      el._place = d.place;
      const handler = () => openPanel(d.place);
      el.onclick = handler;
      el.ontouchend = e => { e.preventDefault(); handler(); };
    }
  });
}

// ─────────────────────────────────────────────
//  Info panel
// ─────────────────────────────────────────────
function openPanel(place){
  const tags = place.tags;

  document.getElementById('panel-category').textContent =
    getTypeEmoji(tags) + ' ' + formatCategory(tags).toUpperCase();

  document.getElementById('panel-name').textContent = place.name;
  document.getElementById('panel-dist').textContent = formatDist(place.dist) + ' away';

  // Tags
  const tagRow = document.getElementById('panel-tags');
  tagRow.innerHTML = '';
  const tagList = [];
  if(tags.amenity)  tagList.push(tags.amenity.replace(/_/g,' '));
  if(tags.cuisine)  tags.cuisine.split(';').slice(0,3).forEach(c => tagList.push(c.replace(/_/g,' ')));
  if(tags.outdoor_seating === 'yes') tagList.push('outdoor seating');
  if(tags.takeaway === 'yes') tagList.push('takeaway');
  if(tags.delivery === 'yes') tagList.push('delivery');
  if(tags['diet:vegetarian'] === 'yes') tagList.push('vegetarian');
  if(tags['diet:vegan'] === 'yes') tagList.push('vegan');
  tagList.slice(0,5).forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    tagRow.appendChild(span);
  });

  // Rows — built with DOM (never innerHTML) to prevent XSS
  const rows = document.getElementById('panel-rows');
  rows.innerHTML = '';

  // FIX WARN: recalculate live distance using current GPS position
  const liveDist = (state.lat && state.lon)
    ? haversine(state.lat, state.lon, place.lat, place.lon)
    : place.dist;

  function makeRow(icon, label, valNode){
    const row = document.createElement('div');
    row.className = 'panel-row';

    const ic = document.createElement('span');
    ic.className = 'panel-icon';
    ic.textContent = icon;

    const lb = document.createElement('span');
    lb.style.cssText = 'color:var(--text-dim);flex:1';
    lb.textContent = label;

    const vl = document.createElement('span');
    vl.className = 'panel-val';
    if(typeof valNode === 'string'){
      vl.textContent = valNode; // always text — never HTML
    } else if(valNode instanceof Node){
      vl.appendChild(valNode);
    }

    row.appendChild(ic); row.appendChild(lb); row.appendChild(vl);
    rows.appendChild(row);
  }

  function addText(icon, label, val){
    if(!val) return;
    makeRow(icon, label, val);
  }

  // FIX BUG 2 (XSS): validate website URL before creating link
  function addWebsite(rawUrl){
    if(!rawUrl) return;
    let safeUrl;
    try {
      const u = new URL(rawUrl);
      if(u.protocol !== 'https:' && u.protocol !== 'http:') return; // reject javascript: etc.
      safeUrl = u.href;
    } catch(e){ return; } // unparseable URL — skip silently

    const a = document.createElement('a');
    a.href = safeUrl;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.color = '#64b5f6';
    // Display truncated hostname only (not the raw href)
    const display = safeUrl.replace(/https?:\/\/(www\.)?/, '').split('/')[0];
    a.textContent = display.length > 28 ? display.slice(0, 28) + '…' : display;
    makeRow('🌐', 'Website', a);
  }

  // FIX BUG 3: use correct OSM element type for deep link
  function osmLink(){
    const type = place.osmType || 'node'; // set during OSM parsing
    const a = document.createElement('a');
    a.href = `https://www.openstreetmap.org/${type}/${place.id}`;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.color = '#64b5f6';
    a.textContent = 'View →';
    makeRow('🗺️', 'OpenStreetMap', a);
  }

  addText('📍', 'Distance', formatDist(liveDist));
  addWebsite(tags.website);
  addText('📞', 'Phone', tags.phone || tags['contact:phone'] || null);
  addText('🕐', 'Hours', tags.opening_hours || null);
  addText('🏠', 'Address', [tags['addr:street'], tags['addr:housenumber']].filter(Boolean).join(' ') || null);
  if(tags.wheelchair === 'yes') addText('♿', 'Accessibility', 'Wheelchair accessible');
  if(tags.wifi === 'yes' || tags.internet_access === 'wlan') addText('📶', 'WiFi', 'Available');
  osmLink();

  infoPanel.classList.add('open');
}

document.getElementById('close-panel').addEventListener('click', () => {
  infoPanel.classList.remove('open');
});

// swipe down to close
let panelStartY = 0;
infoPanel.addEventListener('touchstart', e => { panelStartY = e.touches[0].clientY; }, {passive:true});
infoPanel.addEventListener('touchend', e => {
  if(e.changedTouches[0].clientY - panelStartY > 60) infoPanel.classList.remove('open');
}, {passive:true});

// ─────────────────────────────────────────────
//  Buttons
// ─────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startReal);
document.getElementById('demo-btn').addEventListener('click', startDemo);

// Debug toggle
(function(){
  const btn = document.getElementById('debug-toggle');
  const panel = document.getElementById('debug-panel');
  btn.addEventListener('click', function(){
    const visible = panel.style.display !== 'none';
    panel.style.display = visible ? 'none' : 'block';
    btn.textContent = visible ? '\u{1F50D} Debug' : '\u274C Close';
  });
})();

let currentRadius = MAX_DIST;
refreshBtn.addEventListener('click', async () => {
  if(state.demoMode){ loadDemoPlaces(); return; }
  if(!state.lat){ statusPill.textContent = 'Still waiting for GPS…'; dbg('Refresh tapped but GPS still null'); return; }
  gpsFetched = true; // already fetched once, reset handled below

  // FIX: if 0 results, progressively widen search on each refresh tap
  if(state.places.length === 0 && currentRadius < 5000){
    currentRadius = Math.min(currentRadius * 2, 5000);
    const origFilter = currentRadius;
    const query = `[out:json][timeout:30];(node["amenity"~"restaurant|cafe|fast_food|bar"](around:${origFilter},${state.lat},${state.lon});way["amenity"~"restaurant|cafe|fast_food|bar"](around:${origFilter},${state.lat},${state.lon}););out center tags;`;
    const body = 'data=' + encodeURIComponent(query);
    for(let i = 0; i < OVERPASS_MIRRORS.length; i++){
      const mirror = OVERPASS_MIRRORS[i];
      statusPill.textContent = `⏳ Widening to ${(origFilter/1000).toFixed(1)} km… (${i+1}/${OVERPASS_MIRRORS.length})`;
      const t0 = Date.now();
      try {
        const res = await fetch(mirror, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body, signal: AbortSignal.timeout(30000) });
        if(!res.ok) continue;
        const data = await res.json();
        if(!Array.isArray(data.elements)) continue;
        state.places = data.elements.map(el => {
          const elLat = el.lat ?? el.center?.lat;
          const elLon = el.lon ?? el.center?.lon;
          if(elLat==null||elLon==null) return null;
          return { id:el.id, osmType:el.type||'node', name:el.tags?.name||'Unnamed Place', lat:elLat, lon:elLon, tags:el.tags||{}, dist:haversine(state.lat,state.lon,elLat,elLon) };
        }).filter(Boolean).filter(p=>p.dist<=origFilter).sort((a,b)=>a.dist-b.dist).slice(0,60);
        placeCount.textContent = state.places.length;
        statusPill.textContent = state.places.length > 0 ? `${state.places.length} places (${(origFilter/1000).toFixed(1)} km)` : '0 places — try wider';
        break;
      } catch(e){ continue; }
    }
  } else {
    currentRadius = MAX_DIST; // reset
    await fetchPlaces(state.lat, state.lon);
  }
});

// ─────────────────────────────────────────────
//  roundRect polyfill for older Safari
// ─────────────────────────────────────────────
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    this.moveTo(x+r, y);
    this.lineTo(x+w-r, y);
    this.quadraticCurveTo(x+w, y, x+w, y+r);
    this.lineTo(x+w, y+h-r);
    this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    this.lineTo(x+r, y+h);
    this.quadraticCurveTo(x, y+h, x, y+h-r);
    this.lineTo(x, y+r);
    this.quadraticCurveTo(x, y, x+r, y);
    this.closePath();
  };
}
